<ion-app>
  <ion-split-pane contentId="main-content">
    <ion-menu contentId="main-content" type="overlay">
      <ion-content>
        <ion-img src="../../../assets/logo-dark-v2.png" class="ion-margin ion-padding"></ion-img>
        <ion-list id="labels-list">
          <ion-item button routerLink="/" routerLinkActive="selected">
            <ion-label>Home</ion-label>
          </ion-item>
          <ion-item button routerLink="steps" routerLinkActive="selected">
            <ion-label>Steps</ion-label>
          </ion-item>
          <ion-item button routerLink="cms/{{ menu.content_page.id }}" routerLinkActive="selected" *ngFor="let menu of menus">
            <ion-label>{{ menu.name }}</ion-label>
          </ion-item>
        </ion-list>
      </ion-content>
    </ion-menu>
    <ion-router-outlet id="main-content"></ion-router-outlet>
  </ion-split-pane>
</ion-app>
