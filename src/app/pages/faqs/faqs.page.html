<app-header></app-header>

<ion-content>
  <ion-text class="ion-text-center" color="danger">
    <h1>FAQ's</h1>
  </ion-text>
  <ion-card *ngFor="let faq of faqs" color="secondary">
    <ion-card-header (click)="toggleAnswer(faq.id)">
      <h4>{{ faq.question }}</h4>
    </ion-card-header>
    <!-- Uso de *ngIf para mostrar/esconder baseado em isExpanded -->
    <ion-card-content *ngIf="faq.isExpanded">
      {{ faq.answer }}
    </ion-card-content>
  </ion-card>
</ion-content>
