<app-header></app-header>

<ion-content>

  <swiper-container *ngIf="sliders" pagination="true" autoplay="false" effect="flip">
    <swiper-slide *ngFor="let slide of sliders"
      style="background-image: url('{{ slide.image.original_url }}'); background-size: cover;">
      <div class="slider">
        <h2>
          {{ slide.title }}<br>
          <span class="subtitle">{{ slide.subtitle }}</span><br>
          <ion-button size="small" color="danger" class="ion-margin-top" *ngFor="let about of abouts"
            (click)="showAbout(about.text, about.image.original_url)">Saber mais</ion-button>
        </h2>
      </div>
    </swiper-slide>
  </swiper-container>

  <ion-modal [isOpen]="isModalOpen" [initialBreakpoint]="0.75" [breakpoints]="[0, 0.5, 0.75, 1]"
    (willDismiss)="cancel()">
    <ng-template>
      <ion-header>
        <ion-toolbar color="danger">
          <ion-buttons slot="end">
            <ion-button (click)="cancel()">Fechar</ion-button>
          </ion-buttons>
          <ion-title class="ion-text-center">
            <ion-img src="../../assets/logo-dark-v2.png" class="logo"></ion-img>
          </ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <p [innerHtml]="text" class="ion-text-justify"></p>
        <ion-img [src]="image"></ion-img>
      </ion-content>
    </ng-template>
  </ion-modal>

  <swiper-container *ngIf="spots" pagination="false" autoplay="true" slides-per-view="2">
    <swiper-slide *ngFor="let spot of spots">
      <ion-card style="height: 150px; background: url('{{ spot.photos[0].original_url }}') center center; background-size: cover;"
      class="location-card">
        <ion-card-header>
          <ion-card-title>{{ spot.name }}</ion-card-title>
          <ion-card-subtitle style="color: #cccccc;">{{ spot.location.title }}</ion-card-subtitle>
        </ion-card-header>
        <ion-card-content>
          <h2><span style="color: #f5634b;">€{{ spot.price }}</span><span style="font-size: 12px;"><br>slot de 30 minutos</span></h2>
        </ion-card-content>
      </ion-card>
    </swiper-slide>
  </swiper-container>

  <swiper-container *ngIf="personalTrainers" slides-per-view="2" autoplay="true">
    <swiper-slide *ngFor="let pt of personalTrainers">
      <ion-card routerLink="/pt/{{ pt.id }}">
        <div class="ion-text-center">
          <img class="thumbnail"
            src="{{ pt.photos ? pt.photos[0].original_url : 'https://ionicframework.com/docs/img/demos/thumbnail.svg' }}">
        </div>
        <ion-card-header>
          <ion-card-title style="font-size: 14px;">{{ pt.name }}</ion-card-title>
          <ion-card-subtitle>Personal trainer</ion-card-subtitle>
        </ion-card-header>
        <ion-card-content>
          <h2 style="line-height: 14px;"><span style="color: #f5634b;">€{{ pt.price }}</span><span style="font-size: 12px;"><br>por 30 minutos</span></h2>
        </ion-card-content>
      </ion-card>
    </swiper-slide>
  </swiper-container>

  <swiper-container *ngIf="locations" pagination="false" autoplay="true" slides-per-view="2">
    <swiper-slide *ngFor="let location of locations">
      <ion-card style="background: url('{{ location.image.original_url }}') center center; background-size: cover;"
        class="location-card">
        <ion-card-header>
          <ion-card-subtitle>{{ location.subtitle }}</ion-card-subtitle>
          <ion-card-title>{{ location.title }}</ion-card-title>
        </ion-card-header>
        <ion-card-content>
          <ion-button color="danger" size="small" class="ion-float-right ion-margin-bottom"
            (click)="router.navigateByUrl('location/' + location.id)">Spots</ion-button>
        </ion-card-content>
      </ion-card>
    </swiper-slide>
  </swiper-container>

  <swiper-container *ngIf="galleries" pagination="false" autoplay="true" slides-per-view="2">
    <swiper-slide *ngFor="let gallery of galleries">
      <ion-card>
        <ion-img src="{{ gallery.image.original_url }}" (click)="openGallery(gallery.id)"></ion-img>
      </ion-card>
    </swiper-slide>
  </swiper-container>

  <ion-modal [isOpen]="isGalleryOpen" (willDismiss)="cancel()" [initialBreakpoint]="0.5" [breakpoints]="[0, 0.5]">
    <ng-template>
      <ion-header>
        <ion-toolbar color="danger">
          <ion-title>Galeria</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="isGalleryOpen = false">Close</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <swiper-container *ngIf="galleries" pagination="true" autoplay="false">
          <swiper-slide *ngFor="let gallery of galleries">
            <ion-img src="{{ gallery.image.original_url }}"></ion-img>
          </swiper-slide>
        </swiper-container>
      </ion-content>
    </ng-template>
  </ion-modal>

</ion-content>
